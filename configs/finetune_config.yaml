model:
  checkpoint: checkpoints/ssl/best_ssl.pth
  num_classes: 5
  class_names: [Normal, CIN1, CIN2, CIN3, Cancer]
  dropout: 0.4

data:
  data_dir: data/combined/supervised
  image_size: 224
  num_workers: 0
  use_weighted_sampler: true

training:
  epochs: 50
  batch_size: 4
  base_lr: 3e-4
  weight_decay: 0.01
  warmup_epochs: 3
  freeze_encoder_epochs: 5
  label_smoothing: 0.1
  early_stop_patience: 15

hardware:
  gradient_accumulation_steps: 4
  mixed_precision: true

loss:
  type: focal
  alpha: 0.25
  gamma: 2.0

checkpointing:
  save_dir: checkpoints/finetune
  metric: val_macro_f1

logging:
  csv_log: outputs/finetune_training_log.csv
