model:
  backbone: efficientnet_v2_s
  pretrained: true
  embedding_dim: 512
  projection_mlp_dim: 4096
  temperature: 0.2
  momentum: 0.996

data:
  ssl_data_dir: data/combined/ssl_unlabelled
  image_size: 224
  num_workers: 0

training:
  epochs: 100
  batch_size: 6
  base_lr: 1.5e-4
  weight_decay: 0.1
  warmup_epochs: 10
  early_stop_patience: 20

hardware:
  mixed_precision: true
  gradient_accumulation_steps: 4

checkpointing:
  save_dir: checkpoints/ssl
  save_every_n_epochs: 10
  keep_top_k: 3

logging:
  csv_log: outputs/ssl_training_log.csv
  wandb: false
